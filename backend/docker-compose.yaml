services:
  php:
    build:
      context: ./docker/php
    container_name: php
    volumes:
      - .:/var/www
    working_dir: /var/www

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8001:80"
    volumes:
      - .:/var/www
      - ./docker/nginx:/etc/nginx/conf.d
    depends_on:
      - php